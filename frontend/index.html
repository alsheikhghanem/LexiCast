<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text to Speech Studio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 min-h-screen p-8 font-sans">

<div class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow-lg grid grid-cols-1 md:grid-cols-3 gap-8">

    <div class="col-span-1 space-y-6 bg-gray-50 p-4 rounded-lg border border-gray-200 h-fit">
        <h2 class="text-2xl font-bold text-gray-800 border-b pb-2">Settings</h2>

        <div>
            <label for="voice-select" class="block text-sm font-medium text-gray-700 mb-1">Select Voice</label>
            <select id="voice-select"
                    class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="">Loading voices...</option>
            </select>
        </div>

        <div>
            <label for="rate-select" class="block text-sm font-medium text-gray-700 mb-1">Playback Speed</label>
            <select id="rate-select"
                    class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="-50%">0.5x (Slowest)</option>
                <option value="-25%">0.75x (Slow)</option>
                <option value="+0%" selected>1.0x (Normal)</option>
                <option value="+25%">1.25x (Fast)</option>
                <option value="+50%">1.5x (Very Fast)</option>
                <option value="+75%">1.75x (Super Fast)</option>
                <option value="+100%">2.0x (Maximum)</option>
            </select>
        </div>

        <div class="space-y-3 pt-4 border-t">
            <button id="preview-btn"
                    class="w-full bg-blue-100 text-blue-700 font-semibold p-2 rounded-md hover:bg-blue-200 transition disabled:opacity-50">
                Preview Voice
            </button>
            <button id="generate-btn"
                    class="w-full bg-green-600 text-white font-semibold p-3 rounded-md hover:bg-green-700 transition shadow-md disabled:opacity-50">
                Generate & Play
            </button>
        </div>

        <div id="audio-container" class="hidden mt-4 pt-4 border-t">
            <label for="audio-player" class="block text-sm font-medium text-gray-700 mb-2">Player</label>
            <audio id="audio-player" controls class="w-full outline-none rounded-lg shadow-sm"></audio>
        </div>
    </div>

    <div class="col-span-2 space-y-6">

        <div>
            <label for="text-input" class="block text-sm font-bold text-gray-800 mb-2">Input Text</label>
            <textarea id="text-input" rows="8"
                      class="w-full border border-gray-300 rounded-lg p-3 font-mono text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-y"
                      placeholder="Type your text here..."></textarea>
        </div>

        <div>
            <label class="block text-sm font-bold text-gray-800 mb-2">Live Preview</label>
            <div id="markdown-display"
                 class="w-full border border-gray-200 rounded-lg p-6 bg-white prose max-w-none min-h-[250px] max-h-[500px] overflow-y-auto shadow-inner text-gray-800 leading-relaxed transition-all scroll-smooth relative">
            </div>
        </div>

    </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
