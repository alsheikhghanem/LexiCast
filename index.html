<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text to Speech Studio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8 font-sans">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow-lg grid grid-cols-1 md:grid-cols-3 gap-8">

        <div class="col-span-1 space-y-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 border-b pb-2">Settings</h2>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Select Voice</label>
                <select id="voice-select" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="ar-SA-HamedNeural">ar-SA-HamedNeural (Male)</option>
                    <option value="ar-EG-SalmaNeural">ar-EG-SalmaNeural (Female)</option>
                    <option value="en-US-AriaNeural">en-US-AriaNeural (English Female)</option>
                    <option value="en-US-GuyNeural">en-US-GuyNeural (English Male)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Speed Rate</label>
                <select id="rate-select" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="+0%">1.0x (Normal)</option>
                    <option value="+25%">1.25x (Fast)</option>
                    <option value="+50%">1.5x (Very Fast)</option>
                </select>
            </div>

            <div class="space-y-3 pt-4 border-t">
                <button id="preview-btn" class="w-full bg-blue-100 text-blue-700 font-semibold p-2 rounded-md hover:bg-blue-200 transition">
                    Preview Voice
                </button>
                <button id="generate-btn" class="w-full bg-green-600 text-white font-semibold p-3 rounded-md hover:bg-green-700 transition shadow-md">
                    Generate & Play
                </button>
            </div>

            <div id="audio-container" class="hidden mt-4 pt-4 border-t">
                <label class="block text-sm font-medium text-gray-700 mb-2">Player</label>
                <audio id="audio-player" controls class="w-full outline-none rounded-lg shadow-sm"></audio>
            </div>
        </div>

        <div class="col-span-2 space-y-6">

            <div>
                <label class="block text-sm font-bold text-gray-800 mb-2">Input Text (Markdown Supported)</label>
                <textarea id="text-input" rows="6" class="w-full border border-gray-300 rounded-lg p-3 font-mono text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-y" placeholder="Paste your markdown text here..."></textarea>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-800 mb-2">Live Preview (Word Highlighting Enabled)</label>
                <div id="markdown-display" class="w-full border border-gray-200 rounded-lg p-6 bg-white prose max-w-none min-h-[250px] shadow-inner text-gray-800 leading-relaxed transition-all">
                </div>
            </div>

        </div>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const markdownDisplay = document.getElementById('markdown-display');
        const voiceSelect = document.getElementById('voice-select');
        const rateSelect = document.getElementById('rate-select');
        const generateBtn = document.getElementById('generate-btn');
        const previewBtn = document.getElementById('preview-btn');
        const audioContainer = document.getElementById('audio-container');
        const audioPlayer = document.getElementById('audio-player');

        const API_URL = 'http://127.0.0.1:8000/api/tts';

        let currentBoundaries = [];
        let estimatedBoundaries = [];
        let wordElementsCount = 0;

        function isArabicText(text) {
            const arabicPattern = /[\u0600-\u06FF]/;
            return arabicPattern.test(text);
        }

        function stripMarkdown(mdText) {
            const htmlText = marked.parse(mdText);
            const tempDiv = document.createElement("div");
            tempDiv.innerHTML = htmlText;
            return tempDiv.textContent || tempDiv.innerText || "";
        }

        // Parse markdown while typing
        textInput.addEventListener('input', () => {
            const rawText = textInput.value;
            markdownDisplay.innerHTML = marked.parse(rawText);
            markdownDisplay.setAttribute("dir", isArabicText(rawText) ? "rtl" : "ltr");

            if(isArabicText(rawText)){
                markdownDisplay.classList.add('text-right');
                markdownDisplay.classList.remove('text-left');
            } else {
                markdownDisplay.classList.add('text-left');
                markdownDisplay.classList.remove('text-right');
            }
        });

        // Advanced algorithm to wrap individual words inside the rendered Markdown HTML
        function wrapWordsInMarkdownDisplay() {
            wordElementsCount = 0;

            function walk(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    const text = node.nodeValue;
                    const words = text.split(/(\s+)/);
                    if (words.length <= 1 && text.trim() === '') return;

                    const fragment = document.createDocumentFragment();
                    words.forEach(word => {
                        if (word.trim().length > 0) {
                            const span = document.createElement('span');
                            span.id = `md-word-${wordElementsCount}`;
                            span.className = "transition-colors duration-150 ease-in-out px-1 rounded";
                            span.textContent = word;
                            fragment.appendChild(span);
                            wordElementsCount++;
                        } else {
                            fragment.appendChild(document.createTextNode(word));
                        }
                    });
                    node.parentNode.replaceChild(fragment, node);
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    if (node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
                        Array.from(node.childNodes).forEach(walk);
                    }
                }
            }

            Array.from(markdownDisplay.childNodes).forEach(walk);
        }

        async function fetchAndPlayAudio(textToSpeak, buttonElement) {
            const rawText = textInput.value;
            if (!rawText.trim() && textToSpeak === stripMarkdown(rawText)) {
                alert("Please enter some text first.");
                return;
            }

            const originalText = buttonElement.innerText;
            buttonElement.innerText = "Processing...";
            buttonElement.disabled = true;
            buttonElement.classList.add("opacity-50", "cursor-not-allowed");

            try {
                // 1. Re-render fresh Markdown and set directions
                markdownDisplay.innerHTML = marked.parse(textToSpeak === rawText ? rawText : textInput.value);
                markdownDisplay.setAttribute("dir", isArabicText(textToSpeak) ? "rtl" : "ltr");

                // 2. Inject SPAN tags into the rendered HTML for highlighting
                wrapWordsInMarkdownDisplay();

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: textToSpeak,
                        voice: voiceSelect.value,
                        rate: rateSelect.value
                    })
                });

                if (!response.ok) throw new Error("Failed to generate audio.");

                const data = await response.json();
                audioPlayer.src = "data:audio/mp3;base64," + data.audio;
                currentBoundaries = data.boundaries || [];
                estimatedBoundaries = [];

                audioContainer.classList.remove('hidden');

                // 3. Fallback Algorithm: Calculate timing if API returns empty boundaries
                audioPlayer.onloadedmetadata = () => {
                    if (currentBoundaries.length === 0 && wordElementsCount > 0) {
                        const totalDurationMs = audioPlayer.duration * 1000;
                        const msPerWord = totalDurationMs / wordElementsCount;

                        for (let i = 0; i < wordElementsCount; i++) {
                            estimatedBoundaries.push({
                                startMs: i * msPerWord,
                                endMs: (i + 1) * msPerWord
                            });
                        }
                    }
                    audioPlayer.play();
                };

            } catch (error) {
                console.error("Error:", error);
                alert("Error connecting to the server. Make sure FastAPI is running.");
            } finally {
                buttonElement.innerText = originalText;
                buttonElement.disabled = false;
                buttonElement.classList.remove("opacity-50", "cursor-not-allowed");
            }
        }

        // Core highlighting logic tied to audio playback
        audioPlayer.addEventListener('timeupdate', () => {
            const currentTimeMs = audioPlayer.currentTime * 1000;
            const useEstimated = currentBoundaries.length === 0;
            const boundariesToUse = useEstimated ? estimatedBoundaries : currentBoundaries;

            if (boundariesToUse.length === 0) return;

            // Loop through the maximum possible words
            const maxWords = useEstimated ? wordElementsCount : currentBoundaries.length;

            for (let i = 0; i < maxWords; i++) {
                const boundary = boundariesToUse[i];
                if (!boundary) continue;

                // API boundaries use 10,000 unit offsets. Estimated boundaries use direct MS.
                const startMs = useEstimated ? boundary.startMs : (boundary.offset / 10000);
                const endMs = useEstimated ? boundary.endMs : ((boundary.offset + boundary.duration) / 10000);

                const wordSpan = document.getElementById(`md-word-${i}`);

                if (wordSpan) {
                    if (currentTimeMs >= startMs && currentTimeMs <= endMs) {
                        wordSpan.classList.add('bg-blue-500', 'text-white', 'shadow-sm');
                    } else {
                        wordSpan.classList.remove('bg-blue-500', 'text-white', 'shadow-sm');
                    }
                }
            }
        });

        generateBtn.addEventListener('click', () => {
            const rawText = textInput.value;
            const plainText = stripMarkdown(rawText);
            fetchAndPlayAudio(plainText, generateBtn);
        });

        previewBtn.addEventListener('click', () => {
            const isArabic = voiceSelect.value.includes('ar-');
            const previewText = isArabic
                ? "مرحباً، أنا أختبر نبرة هذا الصوت الآن."
                : "Hello, I am testing the tone of this voice right now.";
            textInput.value = previewText; // Show the preview text in the box
            fetchAndPlayAudio(previewText, previewBtn);
        });
    </script>
</body>
</html>
