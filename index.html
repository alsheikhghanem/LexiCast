<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text to Speech Studio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

    <style>
        /* إيقاف علامات Backticks المزعجة من Tailwind Typography */
        .prose :not(pre) > code::before { content: none !important; }
        .prose :not(pre) > code::after { content: none !important; }

        /* تجميل الكلمات التقنية (Inline Code) بلون احترافي */
        .prose :not(pre) > code {
            color: #be185d;
            background-color: #fdf2f8;
            padding: 0.15rem 0.35rem;
            border-radius: 0.375rem;
            font-weight: 600;
        }

        /* إجبار جميع العناوين لتكون من اليسار إلى اليمين */
        .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 {
            direction: ltr !important;
            text-align: left !important;
        }

        /* إجبار صناديق الأكواد لتكون من اليسار لليمين */
        .prose pre, .prose pre code {
            direction: ltr !important;
            text-align: left !important;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8 font-sans">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow-lg grid grid-cols-1 md:grid-cols-3 gap-8">

        <div class="col-span-1 space-y-6 bg-gray-50 p-4 rounded-lg border border-gray-200 h-fit">
            <h2 class="text-2xl font-bold text-gray-800 border-b pb-2">Settings</h2>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Select Voice</label>
                <select id="voice-select" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">Loading voices...</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Playback Speed</label>
                <select id="rate-select" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="-50%">0.5x (Slowest)</option>
                    <option value="-25%">0.75x (Slow)</option>
                    <option value="+0%" selected>1.0x (Normal)</option>
                    <option value="+25%">1.25x (Fast)</option>
                    <option value="+50%">1.5x (Very Fast)</option>
                    <option value="+75%">1.75x (Super Fast)</option>
                    <option value="+100%">2.0x (Maximum)</option>
                </select>
            </div>

            <div class="space-y-3 pt-4 border-t">
                <button id="preview-btn" class="w-full bg-blue-100 text-blue-700 font-semibold p-2 rounded-md hover:bg-blue-200 transition disabled:opacity-50">
                    Preview Voice
                </button>
                <button id="generate-btn" class="w-full bg-green-600 text-white font-semibold p-3 rounded-md hover:bg-green-700 transition shadow-md disabled:opacity-50">
                    Generate & Play
                </button>
            </div>

            <div id="audio-container" class="hidden mt-4 pt-4 border-t">
                <label class="block text-sm font-medium text-gray-700 mb-2">Player</label>
                <audio id="audio-player" controls class="w-full outline-none rounded-lg shadow-sm"></audio>
            </div>
        </div>

        <div class="col-span-2 space-y-6">

            <div>
                <label class="block text-sm font-bold text-gray-800 mb-2">Input Text</label>
                <textarea id="text-input" rows="8" class="w-full border border-gray-300 rounded-lg p-3 font-mono text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-y" placeholder="Type your text here..."></textarea>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-800 mb-2">Live Preview</label>
                <div id="markdown-display" class="w-full border border-gray-200 rounded-lg p-6 bg-white prose max-w-none min-h-[250px] max-h-[500px] overflow-y-auto shadow-inner text-gray-800 leading-relaxed transition-all scroll-smooth relative">
                </div>
            </div>

        </div>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const markdownDisplay = document.getElementById('markdown-display');
        const voiceSelect = document.getElementById('voice-select');
        const rateSelect = document.getElementById('rate-select');
        const generateBtn = document.getElementById('generate-btn');
        const previewBtn = document.getElementById('preview-btn');
        const audioContainer = document.getElementById('audio-container');
        const audioPlayer = document.getElementById('audio-player');

        const API_BASE_URL = 'http://127.0.0.1:8000/api';

        let currentBoundaries = [];
        let wordElementsCount = 0;
        let animationFrameId = null;
        let currentActiveSpanId = null;

        let spokenWordsList = [];
        let spokenToSpanMap = [];

        document.addEventListener('DOMContentLoaded', async () => {
            generateBtn.disabled = true;
            previewBtn.disabled = true;
            try {
                const response = await fetch(`${API_BASE_URL}/voices`);
                const data = await response.json();

                voiceSelect.innerHTML = '';
                data.voices.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.name;
                    opt.textContent = `${v.name} (${v.gender} | ${v.locale})`;
                    voiceSelect.appendChild(opt);
                });

                generateBtn.disabled = false;
                previewBtn.disabled = false;
            } catch (error) {
                console.error("Error loading voices:", error);
                voiceSelect.innerHTML = '<option value="">Error loading voices. Make sure backend is running.</option>';
            }
        });

        function isArabicText(text) {
            return /[\u0600-\u06FF]/.test(text);
        }

        // التحديث الذكي: يتعرف على | أو :: وينظف الشوائب
        function sanitizeInput(text) {
            return text.replace(/`\{\{\s*(.*?)\s*(?:\||::)\s*(.*?)\s*\}\}`/g, '{{$1::$2}}');
        }

        function renderLivePreview() {
            const rawText = textInput.value;
            const sanitizedText = sanitizeInput(rawText);

            let dictionary = {};
            let counter = 0;

            // التحديث الذكي: يقبل | (للنصوص القديمة) ويقبل :: (للنصوص الجديدة)
            let preProcessedText = sanitizedText.replace(/\{\{\s*(.*?)\s*(?:\||::)\s*(.*?)\s*\}\}/g, function(match, visual, phonetic) {
                let token = '@@DUAL_' + counter++ + '@@';
                dictionary[token] = { visual: visual.trim(), phonetic: phonetic.trim() };
                return token;
            });

            let htmlContent = marked.parse(preProcessedText);

            htmlContent = htmlContent.replace(/@@DUAL_\d+@@/g, function(match) {
                let data = dictionary[match];
                if (data) {
                    return `<span class="dual-word text-blue-800 bg-blue-50 px-1 border border-blue-200 rounded font-bold transition-all duration-75 ease-in-out inline-block" data-phonetic="${data.phonetic}">${data.visual}</span>`;
                }
                return match;
            });

            markdownDisplay.innerHTML = htmlContent;

            const isRTL = isArabicText(sanitizedText);
            markdownDisplay.setAttribute("dir", isRTL ? "rtl" : "ltr");
            markdownDisplay.className = `w-full border border-gray-200 rounded-lg p-6 bg-white prose max-w-none min-h-[250px] max-h-[500px] overflow-y-auto shadow-inner text-gray-800 leading-relaxed transition-all scroll-smooth relative ${isRTL ? 'text-right' : 'text-left'}`;
        }

        textInput.addEventListener('input', renderLivePreview);

        function buildMemoryMapAndDOM() {
            wordElementsCount = 0;
            spokenWordsList = [];
            spokenToSpanMap = [];

            function walk(node) {
                if (node.nodeType === Node.ELEMENT_NODE && node.tagName.toUpperCase() === 'PRE') {
                    return;
                }

                if (node.nodeType === Node.ELEMENT_NODE && node.classList && node.classList.contains('dual-word')) {
                    const spanId = `md-word-${wordElementsCount++}`;
                    node.id = spanId;
                    node.setAttribute('data-original-class', node.className);

                    const phoneticText = node.getAttribute('data-phonetic');
                    const phoneticWords = phoneticText.split(/\s+/);

                    phoneticWords.forEach(pw => {
                        if (pw.trim().length > 0) {
                            spokenWordsList.push(pw);
                            spokenToSpanMap.push(spanId);
                        }
                    });
                    return;
                }

                if (node.nodeType === Node.TEXT_NODE) {
                    const text = node.nodeValue;
                    const words = text.split(/(\s+)/);
                    if (words.length <= 1 && text.trim() === '') return;

                    const fragment = document.createDocumentFragment();
                    words.forEach(word => {
                        if (word.trim().length > 0) {
                            const spanId = `md-word-${wordElementsCount++}`;
                            const span = document.createElement('span');
                            span.id = spanId;
                            span.className = "transition-all duration-75 ease-in-out px-1 rounded inline-block text-gray-800";
                            span.setAttribute('data-original-class', span.className);
                            span.textContent = word;
                            fragment.appendChild(span);

                            spokenWordsList.push(word);
                            spokenToSpanMap.push(spanId);
                        } else {
                            fragment.appendChild(document.createTextNode(word));
                        }
                    });
                    node.parentNode.replaceChild(fragment, node);
                } else if (node.nodeType === Node.ELEMENT_NODE && !['SCRIPT', 'STYLE'].includes(node.nodeName)) {
                    Array.from(node.childNodes).forEach(walk);
                }
            }

            Array.from(markdownDisplay.childNodes).forEach(walk);

            return spokenWordsList.join(" ");
        }

        function alignBoundariesToMemoryMap(apiBoundaries) {
            const processedBoundaries = [];
            let spokenIndex = 0;
            const cleanRegex = /[^\u0600-\u06FFa-zA-Z0-9]/g;

            for (let b of apiBoundaries) {
                if (!b.text) continue;
                const cleanApiText = b.text.replace(cleanRegex, '').toLowerCase();
                if (!cleanApiText) continue;

                let matchedSpanId = null;

                for (let i = spokenIndex; i < Math.min(spokenIndex + 6, spokenWordsList.length); i++) {
                    const cleanExpected = spokenWordsList[i].replace(cleanRegex, '').toLowerCase();
                    if (cleanExpected && (cleanExpected.includes(cleanApiText) || cleanApiText.includes(cleanExpected))) {
                        matchedSpanId = spokenToSpanMap[i];
                        spokenIndex = i + 1;
                        break;
                    }
                }

                if (!matchedSpanId && spokenIndex < spokenWordsList.length) {
                    matchedSpanId = spokenToSpanMap[spokenIndex];
                    spokenIndex++;
                }

                if (matchedSpanId) {
                    processedBoundaries.push({
                        startMs: b.offset / 10000,
                        endMs: (b.offset + b.duration) / 10000,
                        spanId: matchedSpanId
                    });
                }
            }
            return processedBoundaries;
        }

        function generateAutomatedWeightedBoundaries(totalDurationMs) {
            let totalWeight = 0;
            const weights = [];

            for (let i = 0; i < spokenWordsList.length; i++) {
                const word = spokenWordsList[i];
                let weight = word.length * 50;

                if (/[.,!?؛،:]/.test(word)) weight += 350;
                if (/[\n\r]/.test(word)) weight += 500;

                weight = Math.max(weight, 50);
                weights.push(weight);
                totalWeight += weight;
            }

            const msPerWeightUnit = totalDurationMs / totalWeight;
            let currentMs = 0;
            const boundaries = [];

            for (let i = 0; i < spokenWordsList.length; i++) {
                const duration = weights[i] * msPerWeightUnit;
                boundaries.push({
                    startMs: currentMs,
                    endMs: currentMs + duration,
                    spanId: spokenToSpanMap[i]
                });
                currentMs += duration;
            }
            return boundaries;
        }

        async function fetchAndPlayAudio(buttonElement) {
            const rawText = textInput.value;
            if (!rawText.trim()) {
                alert("Please enter some text first.");
                return;
            }

            const originalText = buttonElement.innerText;
            buttonElement.innerText = "Processing...";
            buttonElement.disabled = true;

            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            currentActiveSpanId = null;

            try {
                renderLivePreview();

                const finalSpokenText = buildMemoryMapAndDOM();

                const response = await fetch(`${API_BASE_URL}/tts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: finalSpokenText,
                        voice: voiceSelect.value,
                        rate: rateSelect.value
                    })
                });

                if (!response.ok) throw new Error("Failed to generate audio.");

                const data = await response.json();
                audioPlayer.src = "data:audio/mp3;base64," + data.audio;

                audioPlayer.onloadedmetadata = () => {
                    const rawBoundaries = data.boundaries || [];

                    if (rawBoundaries.length > 0) {
                        currentBoundaries = alignBoundariesToMemoryMap(rawBoundaries);
                    } else {
                        const totalDurationMs = audioPlayer.duration * 1000;
                        currentBoundaries = generateAutomatedWeightedBoundaries(totalDurationMs);
                    }

                    let numRate = 1.0;
                    const val = rateSelect.value;
                    if(val === "-50%") numRate = 0.5;
                    else if(val === "-25%") numRate = 0.75;
                    else if(val === "+0%") numRate = 1.0;
                    else if(val === "+25%") numRate = 1.25;
                    else if(val === "+50%") numRate = 1.5;
                    else if(val === "+75%") numRate = 1.75;
                    else if(val === "+100%") numRate = 2.0;

                    audioPlayer.playbackRate = numRate;
                    audioPlayer.play();
                };

                audioContainer.classList.remove('hidden');

            } catch (error) {
                console.error("Error:", error);
                alert("Error connecting to the server.");
            } finally {
                buttonElement.innerText = originalText;
                buttonElement.disabled = false;
            }
        }

        function syncHighlightEngine() {
            if (audioPlayer.paused || audioPlayer.ended || currentBoundaries.length === 0) return;

            const currentTimeMs = audioPlayer.currentTime * 1000;
            let activeSpanId = null;

            for (let i = 0; i < currentBoundaries.length; i++) {
                if (currentTimeMs >= currentBoundaries[i].startMs && currentTimeMs <= currentBoundaries[i].endMs) {
                    activeSpanId = currentBoundaries[i].spanId;
                    break;
                }
            }

            if (activeSpanId !== currentActiveSpanId) {
                if (currentActiveSpanId) {
                    const oldSpan = document.getElementById(currentActiveSpanId);
                    if (oldSpan) {
                        oldSpan.className = oldSpan.getAttribute('data-original-class');
                    }
                }

                if (activeSpanId) {
                    const newSpan = document.getElementById(activeSpanId);
                    if (newSpan) {
                        newSpan.className = "transition-all duration-75 ease-in-out px-1 rounded inline-block bg-blue-600 text-white shadow-md scale-110 relative z-10";

                        const container = markdownDisplay;
                        const scrollPos = newSpan.offsetTop - (container.clientHeight / 2) + (newSpan.clientHeight / 2);
                        container.scrollTo({ top: scrollPos, behavior: 'smooth' });
                    }
                }
                currentActiveSpanId = activeSpanId;
            }

            animationFrameId = requestAnimationFrame(syncHighlightEngine);
        }

        audioPlayer.addEventListener('play', () => {
            animationFrameId = requestAnimationFrame(syncHighlightEngine);
        });

        audioPlayer.addEventListener('pause', () => {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
        });

        generateBtn.addEventListener('click', () => {
            fetchAndPlayAudio(generateBtn);
        });

        previewBtn.addEventListener('click', () => {
            const previewText = "Hello, this is a live test to verify the audio system and check the highlighted words successfully.";
            textInput.value = previewText;
            textInput.dispatchEvent(new Event('input'));
            fetchAndPlayAudio(previewBtn);
        });

        rateSelect.addEventListener('change', () => {
            let numRate = 1.0;
            const val = rateSelect.value;
            if(val === "-50%") numRate = 0.5;
            else if(val === "-25%") numRate = 0.75;
            else if(val === "+0%") numRate = 1.0;
            else if(val === "+25%") numRate = 1.25;
            else if(val === "+50%") numRate = 1.5;
            else if(val === "+75%") numRate = 1.75;
            else if(val === "+100%") numRate = 2.0;

            audioPlayer.playbackRate = numRate;
        });
    </script>
</body>
</html>
